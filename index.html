<script>
  
let products = JSON.parse(localStorage.getItem("products")) || [];

    let container =  document.getElementById("websiteProducts");
    container.innerHTML='';
    if(products.length === 0){
        container.innerHTML = "<h5 class='text-center'> Products Not Found</h5>"
    }
    products.forEach((p)=> {
        container.innerHTML += `
        <div class="col-md-3 mt-4">
            <div class="card h-100 shadow-sm">
                <img src="${p.image}" class="top-image " h-220>
                <div class="card-body text-center">
                    <h5 class="fw-bold">${p.name}</h5>
                    <p>${p.desc}</p>
               <h6 class="text-success" >Rs:${p.price}</h6>
               <button class="btn btn-primary" > Add To Card </button>
                    </div>
                </div>
            </div>
        `
    });

</script>
